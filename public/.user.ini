; PHP upload limits for floor plan images and other file uploads
; Required for: floor plan images, booth images, documents, etc.
; Note: php artisan serve ignores .user.ini - use php.ini or run: php -d upload_max_filesize=20M -d post_max_size=25M artisan serve
upload_max_filesize = 20M
post_max_size = 25M
max_execution_time = 120
memory_limit = 256M
